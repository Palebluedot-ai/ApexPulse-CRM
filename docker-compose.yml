services:
  postgres:
    image: postgres:17-alpine
    container_name: hashkey-otc-crm-v1-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hashkey_otc_crm_v1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hashkey_otc_crm_v1"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
